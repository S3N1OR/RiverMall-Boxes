<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Сетка квадратов</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #ffffff;
      --surface: #ffffff;
      --text: #111111;
      --muted: #666666;
      --border: #d9d9d9;
      --accent: #111111;
      --danger: #8a1c1c;
      --cell-size: 56px;
      --gap: 10px;
      --control-size: 36px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font: 16px/1.4 Arial, sans-serif;
    }

    .hidden {
      display: none !important;
    }

    .gate {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .gate-card {
      width: min(100%, 420px);
      padding: 24px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: var(--surface);
    }

    .gate-card h1 {
      margin: 0 0 10px;
      font-size: 28px;
    }

    .gate-card p {
      margin: 0 0 16px;
      color: var(--muted);
    }

    .gate-form {
      display: grid;
      gap: 12px;
    }

    .gate-input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font: inherit;
    }

    .gate-error {
      min-height: 20px;
      color: var(--danger);
      font-size: 14px;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px;
      gap: 24px;
    }

    .panel {
      width: min(100%, 980px);
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: var(--surface);
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    button {
      border: 1px solid var(--accent);
      background: #ffffff;
      color: var(--text);
      border-radius: 10px;
      padding: 10px 14px;
      font: inherit;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    button.is-selected {
      background: #111111;
      color: #ffffff;
    }

    .status {
      color: var(--muted);
      font-size: 14px;
    }

    .status.is-error {
      color: var(--danger);
    }

    .board-wrap {
      width: min(100%, 980px);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 18px;
      overflow: hidden;
      background: var(--surface);
    }

    .board-scale {
      width: 100%;
      overflow: hidden;
    }

    .editor-shell {
      display: grid;
      gap: var(--gap);
      align-items: start;
      width: max-content;
      transform-origin: top left;
    }

    .column-controls {
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: var(--cell-size);
      justify-content: start;
      margin-left: calc(var(--control-size) + var(--gap));
      gap: var(--gap);
    }

    .column-controls .grid-control {
      justify-self: center;
    }

    .column-controls.is-hidden {
      visibility: hidden;
      height: 0;
      margin: 0;
      overflow: hidden;
    }

    .board-row {
      display: flex;
      align-items: center;
      gap: var(--gap);
    }

    .rows {
      display: grid;
      gap: var(--gap);
    }

    .row-cells {
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: var(--cell-size);
      gap: var(--gap);
    }

    .column-add-spacer {
      width: var(--control-size);
      height: var(--control-size);
      border: 1px dashed var(--border);
      border-radius: 10px;
      background: transparent;
      visibility: hidden;
    }

    .grid-control {
      width: var(--control-size);
      height: var(--control-size);
      padding: 0;
      border: 1px dashed var(--border);
      border-radius: 10px;
      display: grid;
      place-items: center;
      font-size: 20px;
      line-height: 1;
    }

    .grid-control.grid-add {
      font-size: 22px;
    }

    .grid-control.grid-remove {
      color: #7a7a7a;
    }

    .grid-control.is-hidden {
      visibility: hidden;
      pointer-events: none;
    }

    .bottom-add-row {
      display: flex;
      gap: var(--gap);
      align-items: center;
    }

    .cell-slot {
      width: var(--cell-size);
      height: var(--cell-size);
      border: 1px dashed #d6d6d6;
      background: #fcfcfc;
      border-radius: 8px;
    }

    .cell-slot.is-hidden {
      visibility: hidden;
    }

    .cell,
    .cell-empty {
      width: 100%;
      height: 100%;
      border-radius: 8px;
      padding: 0;
      font: inherit;
    }

    .cell {
      position: relative;
      border: 1px solid #bfbfbf;
      background: #ffffff;
    }

    .cell-empty {
      border: 1px dashed #cfcfcf;
      background: #f2f2f2;
    }

    .cell.is-active::before,
    .cell.is-active::after {
      content: "";
      position: absolute;
      top: 50%;
      left: 50%;
      width: 34px;
      height: 2px;
      background: var(--accent);
      transform-origin: center;
    }

    .cell.is-active::before {
      transform: translate(-50%, -50%) rotate(45deg);
    }

    .cell.is-active::after {
      transform: translate(-50%, -50%) rotate(-45deg);
    }

    @media (max-width: 640px) {
      :root {
        --cell-size: 46px;
        --gap: 8px;
        --control-size: 32px;
      }

      .page,
      .gate {
        padding: 16px;
      }

      .panel,
      .board-wrap,
      .gate-card {
        padding: 14px;
      }

      .panel {
        justify-content: center;
        border-radius: 14px;
      }

      .controls {
        justify-content: center;
        width: 100%;
      }

      .controls button {
        flex: 1 1 calc(50% - 5px);
      }

      .status {
        width: 100%;
        text-align: left;
      }

      .board-wrap {
        border-radius: 16px;
      }

      .editor-shell {
        min-width: 0;
      }
    }

    @media (hover: hover) and (pointer: fine) {
      button:hover:not(:disabled) {
        background: #f3f3f3;
      }

      .cell:hover:not(:disabled) {
        background: #f7f7f7;
      }

      .cell-empty:hover:not(:disabled) {
        background: #ebebeb;
      }
    }
  </style>
</head>
<body>
  <section class="gate" id="gate">
    <div class="gate-card">
      <h1>Доступ</h1>
      <p>Введите код доступа. Без него сетка не откроется.</p>
      <form class="gate-form" id="gate-form">
        <input class="gate-input" id="access-code" type="password" placeholder="Код доступа" autocomplete="off" required>
        <button type="submit" id="gate-submit">Войти</button>
        <div class="gate-error" id="gate-error"></div>
      </form>
    </div>
  </section>

  <div class="page hidden" id="app">
    <section class="panel">
      <div class="controls">
        <button type="button" id="edit-toggle" class="hidden">Редактировать</button>
        <button type="button" id="reconnect">Переподключиться</button>
        <button type="button" id="logout">Выйти</button>
      </div>
      <div class="status" id="status">Подключение...</div>
    </section>

    <section class="board-wrap" id="board-wrap">
      <div class="board-scale" id="board-scale">
        <div class="editor-shell" id="editor-shell">
          <div class="column-controls" id="column-controls"></div>
          <div class="rows" id="rows"></div>
          <div class="bottom-add-row" id="bottom-add-row"></div>
        </div>
      </div>
    </section>
  </div>

  <script type="module">
    import {
      SUPABASE_FUNCTIONS_BASE,
      GRID_API_FUNCTION_NAME,
      SESSION_STORAGE_KEY
    } from "./supabase-config.js";

    const MIN_SIZE = 1;
    const SYNC_INTERVAL_MS = 1500;
    const DEFAULT_STATE = {
      rows: 4,
      cols: 4,
      cells: []
    };

    const gate = document.getElementById("gate");
    const app = document.getElementById("app");
    const gateForm = document.getElementById("gate-form");
    const gateSubmit = document.getElementById("gate-submit");
    const accessCodeInput = document.getElementById("access-code");
    const gateError = document.getElementById("gate-error");

    const boardScale = document.getElementById("board-scale");
    const editorShell = document.getElementById("editor-shell");
    const rowsRoot = document.getElementById("rows");
    const columnControls = document.getElementById("column-controls");
    const bottomAddRow = document.getElementById("bottom-add-row");
    const status = document.getElementById("status");
    const editToggleButton = document.getElementById("edit-toggle");
    const reconnectButton = document.getElementById("reconnect");
    const logoutButton = document.getElementById("logout");

    const functionUrl = SUPABASE_FUNCTIONS_BASE.replace(/\/$/, "") + "/" + GRID_API_FUNCTION_NAME;

    let sessionToken = localStorage.getItem(SESSION_STORAGE_KEY) || "";
    let accessRole = "user";
    let state = normalizeState(DEFAULT_STATE);
    let serverVersion = 0;
    let layoutDirty = false;
    let editMode = false;
    let requestInFlight = false;
    let lastError = "";
    let networkOffline = !navigator.onLine;

    function createCells(rows, cols, existing = []) {
      const nextCells = [];

      for (let row = 0; row < rows; row += 1) {
        const currentRow = [];

        for (let col = 0; col < cols; col += 1) {
          const source = existing[row] && existing[row][col];
          currentRow.push({
            enabled: Boolean(source && source.enabled),
            marked: Boolean(source && source.marked)
          });
        }

        nextCells.push(currentRow);
      }

      return nextCells;
    }

    function normalizeState(source) {
      const rows = Math.max(MIN_SIZE, Number(source?.rows) || DEFAULT_STATE.rows);
      const cols = Math.max(MIN_SIZE, Number(source?.cols) || DEFAULT_STATE.cols);

      return {
        rows,
        cols,
        cells: createCells(rows, cols, source?.cells || [])
      };
    }

    function countEnabledCells(cells) {
      let total = 0;

      for (const row of cells) {
        for (const cell of row) {
          if (cell.enabled) {
            total += 1;
          }
        }
      }

      return total;
    }

    function setStatus(message, isError = false) {
      status.textContent = message;
      status.classList.toggle("is-error", isError);
    }

    function setGateError(message) {
      gateError.textContent = message;
    }

    function showGate() {
      gate.classList.remove("hidden");
      app.classList.add("hidden");
    }

    function showApp() {
      gate.classList.add("hidden");
      app.classList.remove("hidden");
    }

    function canEditLayout() {
      return accessRole === "developer";
    }

    function updateStatus() {
      const roleLabel = canEditLayout() ? "режим: разработчик" : "режим: обычный";
      const summary = state.rows + " x " + state.cols + " | квадратов: " + countEnabledCells(state.cells) + " | " + roleLabel;

      if (networkOffline) {
        setStatus(summary + " | сеть недоступна, нажмите «Переподключиться»", true);
        return;
      }

      if (lastError) {
        setStatus(summary + " | " + lastError, true);
        return;
      }

      if (requestInFlight) {
        setStatus(summary + " | синхронизация...");
        return;
      }

      if (editMode && layoutDirty) {
        setStatus(summary + " | есть несохранённые изменения");
        return;
      }

      if (editMode) {
        setStatus(summary + " | редактирование");
        return;
      }

      setStatus(summary + " | синхронизировано");
    }

    function updateControls() {
      const developer = canEditLayout();

      editToggleButton.classList.toggle("hidden", !developer);
      editToggleButton.disabled = requestInFlight;
      reconnectButton.disabled = requestInFlight;
      logoutButton.disabled = requestInFlight;

      if (!developer) {
        return;
      }

      if (!editMode) {
        editToggleButton.textContent = "Редактировать";
        editToggleButton.classList.remove("is-selected");
        return;
      }

      if (layoutDirty) {
        editToggleButton.textContent = "Сохранить";
      } else {
        editToggleButton.textContent = "Готово";
      }

      editToggleButton.classList.add("is-selected");
    }

    function createGridControl(label, title, className, onClick, disabled = false) {
      const button = document.createElement("button");
      button.type = "button";
      button.className = "grid-control " + className;
      button.textContent = label;
      button.title = title;
      button.disabled = disabled || requestInFlight;
      button.addEventListener("click", onClick);
      return button;
    }

    function syncBoardScale() {
      const compactView = window.matchMedia("(max-width: 640px)").matches;

      editorShell.style.transform = "scale(1)";

      if (!compactView) {
        boardScale.style.height = "";
        return;
      }

      requestAnimationFrame(() => {
        const availableWidth = boardScale.clientWidth;
        const contentWidth = editorShell.getBoundingClientRect().width;
        const contentHeight = editorShell.getBoundingClientRect().height;
        const scale = contentWidth > 0 ? Math.min(1, availableWidth / contentWidth) : 1;

        editorShell.style.transform = "scale(" + scale + ")";
        boardScale.style.height = Math.ceil(contentHeight * scale) + "px";
      });
    }

    function renderColumnControls() {
      columnControls.innerHTML = "";
      const visible = canEditLayout() && editMode;
      columnControls.classList.toggle("is-hidden", !visible);

      if (!visible) {
        return;
      }

      for (let col = 0; col < state.cols; col += 1) {
        const removeButton = createGridControl(
          "−",
          "Удалить столбец",
          "grid-remove",
          () => removeColumn(col),
          state.cols <= MIN_SIZE
        );
        columnControls.appendChild(removeButton);
      }

      columnControls.appendChild(
        createGridControl("+", "Добавить столбец", "grid-add", () => addColumn())
      );
    }

    function renderRows() {
      rowsRoot.innerHTML = "";

      for (let row = 0; row < state.rows; row += 1) {
        const rowWrap = document.createElement("div");
        rowWrap.className = "board-row";

        if (canEditLayout() && editMode) {
          rowWrap.appendChild(
            createGridControl(
              "−",
              "Удалить ряд",
              "grid-remove",
              () => removeRow(row),
              state.rows <= MIN_SIZE
            )
          );
        } else {
          const spacer = document.createElement("div");
          spacer.className = "column-add-spacer";
          rowWrap.appendChild(spacer);
        }

        const rowCells = document.createElement("div");
        rowCells.className = "row-cells";

        for (let col = 0; col < state.cols; col += 1) {
          const currentCell = state.cells[row][col];
          const slot = document.createElement("div");
          const hideEmptyCell = !currentCell.enabled && !editMode;

          slot.className = "cell-slot";
          if (hideEmptyCell) {
            slot.classList.add("is-hidden");
          }

          if (currentCell.enabled) {
            const cell = document.createElement("button");
            cell.type = "button";
            cell.className = "cell";
            cell.disabled = requestInFlight;
            cell.setAttribute("aria-label", "Квадрат " + (row + 1) + ":" + (col + 1));

            if (currentCell.marked) {
              cell.classList.add("is-active");
            }

            cell.addEventListener("click", async () => {
              if (requestInFlight) {
                return;
              }

              if (canEditLayout() && editMode) {
                state.cells[row][col] = { enabled: false, marked: false };
                layoutDirty = true;
                lastError = "";
                render();
                return;
              }

              state.cells[row][col].marked = !state.cells[row][col].marked;
              lastError = "";
              render();
              await saveState();
            });

            slot.appendChild(cell);
          } else {
            const emptyCell = document.createElement("button");
            emptyCell.type = "button";
            emptyCell.className = "cell-empty";
            emptyCell.disabled = requestInFlight || !(canEditLayout() && editMode);
            emptyCell.setAttribute("aria-label", "Пустая ячейка " + (row + 1) + ":" + (col + 1));
            emptyCell.addEventListener("click", () => {
              if (requestInFlight || !(canEditLayout() && editMode)) {
                return;
              }

              state.cells[row][col] = { enabled: true, marked: false };
              layoutDirty = true;
              lastError = "";
              render();
            });
            slot.appendChild(emptyCell);
          }

          rowCells.appendChild(slot);
        }

        rowWrap.appendChild(rowCells);
        rowsRoot.appendChild(rowWrap);
      }
    }

    function renderBottomAdd() {
      bottomAddRow.innerHTML = "";

      if (!(canEditLayout() && editMode)) {
        return;
      }


      const addRowButton = createGridControl("+", "Добавить ряд", "grid-add", () => addRow());
      bottomAddRow.appendChild(addRowButton);
    }

    function render() {
      if (!canEditLayout()) {
        editMode = false;
        layoutDirty = false;
      }

      updateControls();
      updateStatus();
      renderColumnControls();
      renderRows();
      renderBottomAdd();
      syncBoardScale();
    }

    function addRow() {
      state.rows += 1;
      state.cells.push(Array.from({ length: state.cols }, () => ({ enabled: false, marked: false })));
      layoutDirty = true;
      lastError = "";
      render();
    }

    function removeRow(rowIndex) {
      if (state.rows <= MIN_SIZE) {
        return;
      }

      state.cells.splice(rowIndex, 1);
      state.rows -= 1;
      layoutDirty = true;
      lastError = "";
      render();
    }

    function addColumn() {
      for (const row of state.cells) {
        row.push({ enabled: false, marked: false });
      }

      state.cols += 1;
      layoutDirty = true;
      lastError = "";
      render();
    }

    function removeColumn(colIndex) {
      if (state.cols <= MIN_SIZE) {
        return;
      }

      for (const row of state.cells) {
        row.splice(colIndex, 1);
      }

      state.cols -= 1;
      layoutDirty = true;
      lastError = "";
      render();
    }

    async function apiRequest(action, payload = {}) {
      try {
        const response = await fetch(functionUrl, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            action,
            session_token: sessionToken,
            ...payload
          })
        });

        const data = await response.json().catch(() => ({}));
        if (!response.ok) {
          throw new Error(data.error || "ошибка запроса");
        }

        networkOffline = false;
        return data;
      } catch (error) {
        if (!navigator.onLine || error instanceof TypeError) {
          networkOffline = !navigator.onLine;
          throw new Error("сбой сети или VPN, переключитесь и нажмите «Переподключиться»");
        }

        throw error;
      }
    }

    async function login(code) {
      gateSubmit.disabled = true;
      setGateError("");

      try {
        const data = await apiRequest("login", { access_code: code });
        sessionToken = data.session_token || "";
        accessRole = data.access_role || "user";
        localStorage.setItem(SESSION_STORAGE_KEY, sessionToken);
        showApp();
        await fetchState(false);
      } catch (error) {
        sessionToken = "";
        localStorage.removeItem(SESSION_STORAGE_KEY);
        setGateError(error.message);
        showGate();
      } finally {
        gateSubmit.disabled = false;
      }
    }

    async function fetchState(silent = false) {
      if (requestInFlight && silent) {
        return;
      }

      try {
        if (!silent) {
          requestInFlight = true;
          render();
        }

        const data = await apiRequest("get_state");
        accessRole = data.access_role || accessRole;

        if (!layoutDirty) {
          state = normalizeState(data.state);
          serverVersion = Number(data.version) || 1;
          lastError = "";
        } else {
          serverVersion = Number(data.version) || serverVersion;
        }
      } catch (error) {
        if (error.message === "unauthorized") {
          logout();
          return;
        }

        if (!navigator.onLine) {
          networkOffline = true;
        }

        lastError = error.message;
      } finally {
        requestInFlight = false;
        render();
      }
    }

    async function saveState() {
      requestInFlight = true;
      render();

      try {
        const data = await apiRequest("save_state", {
          base_version: serverVersion,
          state
        });

        accessRole = data.access_role || accessRole;
        state = normalizeState(data.state);
        serverVersion = Number(data.version) || serverVersion;
        layoutDirty = false;
        lastError = "";
        return true;
      } catch (error) {
        if (error.message === "conflict") {
          await fetchState(true);
          layoutDirty = false;
          lastError = "конфликт: данные уже изменил другой сотрудник";
        } else if (error.message === "forbidden") {
          layoutDirty = false;
          lastError = "редактирование сетки доступно только разработчику";
          await fetchState(true);
        } else if (error.message === "unauthorized") {
          logout();
          return false;
        } else {
          if (!navigator.onLine) {
            networkOffline = true;
          }

          lastError = error.message;
        }

        return false;
      } finally {
        requestInFlight = false;
        render();
      }
    }

    function logout() {
      sessionToken = "";
      accessRole = "user";
      networkOffline = !navigator.onLine;
      localStorage.removeItem(SESSION_STORAGE_KEY);
      layoutDirty = false;
      editMode = false;
      lastError = "";
      setGateError("");
      accessCodeInput.value = "";
      showGate();
    }

    async function reconnect() {
      networkOffline = !navigator.onLine;
      lastError = "";
      render();

      if (!sessionToken) {
        return;
      }

      await fetchState(false);
    }

    gateForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      const code = accessCodeInput.value.trim();
      if (!code) {
        setGateError("введите код доступа");
        return;
      }

      await login(code);
    });

    editToggleButton.addEventListener("click", async () => {
      if (!canEditLayout() || requestInFlight) {
        return;
      }

      if (!editMode) {
        editMode = true;
        lastError = "";
        render();
        return;
      }

      if (!layoutDirty) {
        editMode = false;
        lastError = "";
        render();
        return;
      }

      const saved = await saveState();
      if (saved) {
        editMode = false;
        render();
      }
    });

    reconnectButton.addEventListener("click", async () => {
      await reconnect();
    });

    logoutButton.addEventListener("click", () => {
      logout();
    });

    window.addEventListener("online", async () => {
      networkOffline = false;
      lastError = "";
      render();
      await reconnect();
    });

    window.addEventListener("offline", () => {
      networkOffline = true;
      render();
    });

    window.addEventListener("resize", syncBoardScale);

    if (sessionToken) {
      showApp();
      render();
      await fetchState(false);
    } else {
      showGate();
    }

    setInterval(() => {
      if (sessionToken && !layoutDirty && !requestInFlight) {
        fetchState(true);
      }
    }, SYNC_INTERVAL_MS);
  </script>
</body>
</html>
